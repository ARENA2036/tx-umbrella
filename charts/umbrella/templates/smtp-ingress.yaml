{{ if index .Values "smtp4dev" "enabled" }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: smtp4dev-ingress
  labels:
    name: smtp4dev-ingress
  {{- with .Values.smtp4dev.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if and .Values.smtp4dev.ingress.className (semverCompare ">=1.18-0" .Capabilities.KubeVersion.GitVersion) }}
  ingressClassName: {{ .Values.smtp4dev.ingress.className }}
  {{- end }}
  {{- if .Values.smtp4dev.ingress.tls }}
  tls:
    {{- range .Values.smtp4dev.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
  - host: {{ .Values.smtp4dev.ingress.url }}
    http:
      paths:
      - pathType: Prefix
        path: "/"
        backend:
          service:
            name: smtp4dev
            port: 
              number: {{ .Values.smtp4dev.ports.http }}
{{ end }}
